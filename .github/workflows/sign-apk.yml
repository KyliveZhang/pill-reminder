name: Sign APK

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download uber-apk-signer
        run: |
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar

      - name: Sign APK
        run: |
          # 签名仓库中第一个找到的 .apk 文件（应该就是您的 unsigned.apk）
          java -jar uber-apk-signer-1.3.0.jar --apks *.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: pill-reminder-signed
          path: "*-aligned-debugSigned.apk"
